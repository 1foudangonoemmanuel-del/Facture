<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Service - BRYX</title>

  <link rel="stylesheet" href="style.css?v=20260711-server-catalog" />
</head>

<body>

  <header class="simple-header">
    <h1>Service</h1>

    <nav id="roleNav"></nav>
  </header>

  <div id="currentUserBar"></div>

  <main class="service-page">

    <section class="split-workspace">
      <section class="left-board">
        <section id="serviceViewBar" class="service-view-bar"></section>
        <section id="serviceGrid" class="service-grid empty-grid"></section>
      </section>

      <aside id="invoiceDetailPanel" class="invoice-detail-panel">
        <div class="detail-empty">
          <strong>Sélectionne une facture</strong>
          <span>Le détail complet s’affichera ici.</span>
        </div>
      </aside>
    </section>

  </main>

  <div id="serverContextMenu" class="context-menu">
    <button type="button" onclick="contextAddFloatingInvoice()">Nouvelle facture volante</button>
    <button type="button" onclick="contextAddTable()">Ouvrir nouvelle table</button>
  </div>

  <div id="confirmOverlay" class="modal-overlay">
    <div class="modal-box">
      <h2 id="confirmTitle">Confirmer</h2>
      <p id="confirmText">Action à confirmer.</p>

      <div class="modal-actions">
        <button type="button" class="secondary" onclick="closeConfirmModal()">Annuler</button>
        <button type="button" class="danger" id="confirmButton">Confirmer</button>
      </div>
    </div>
  </div>

  <div id="historyOverlay" class="modal-overlay">
    <div class="modal-box history-modal">
      <div class="history-modal-header">
        <h2>Historique service</h2>
        <button type="button" class="small secondary" onclick="closeServiceHistory()">Fermer</button>
      </div>
      <div id="historyList" class="history-list">
        <div class="empty-zone">Aucune action serveur pour le moment.</div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <div id="serviceConnectionBadge" class="service-connection-badge"></div>

  <script src="config.js?v=20260709-keep"></script>
  <script src="auth.js?v=20260709-keep"></script>
  <script src="permissions.js?v=20260709-keep"></script>
  <script src="script.js?v=20260711-server-catalog"></script>
  <script>
    requireRole(["SERVER", "CAISSE", "MANAGER", "ADMIN"]);
    injectRoleNav();
    injectCurrentUserBar();
    renderServicePage();
    startServiceAutoRefresh();
  </script>

</body>

</html>
